version: '3.8'

services:
  cbs-simulator:
    build: .
    container_name: cbs-simulator
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DATABASE_PATH=/app/database/cbs.db
      - JWT_SECRET=cbs-simulator-secret-key-change-in-production
      - ENVIRONMENT=development
    volumes:
      - ./database:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
